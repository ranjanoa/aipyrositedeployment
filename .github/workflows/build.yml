name: Build CimporApp Executable

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller CimporApp.spec

    - name: Package Release
      shell: cmd
      run: |
        mkdir release
        move dist\CimporApp.exe release\
        xcopy templates release\templates\ /E /I /H /Y
        xcopy static release\static\ /E /I /H /Y
        xcopy files release\files\ /E /I /H /Y

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CimporApp-Windows
        path: release/
